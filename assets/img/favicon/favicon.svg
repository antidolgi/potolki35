<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиент для объема (более контрастный) -->
    <linearGradient id="bananaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF176;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#FFEE58;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FDD835;stop-opacity:1" />
    </linearGradient>
    
    <!-- Тень -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Группа с анимацией -->
  <g filter="url(#shadow)">
    
    <!-- Вытянутый корпус банана -->
    <!-- Левый кончик (15,60) -> Низ (60,85) -> Правый кончик (105,60) -> Верх (60,40) -->
    <path d="M 15 60 
             Q 60 88 105 60 
             Q 60 32 15 60 Z" 
          fill="url(#bananaGrad)" 
          stroke="#F9A825" 
          stroke-width="2" 
          stroke-linejoin="round"/>
    
    <!-- Черенки (темные кончики) - более длинные и тонкие -->
    <path d="M 15 60 L 8 58 L 15 62 Z" fill="#5D4037" />
    <path d="M 105 60 L 112 58 L 105 62 Z" fill="#5D4037" />
    
    <!-- Грани (ребро банана) для реалистичности формы -->
    <path d="M 25 60 Q 60 80 95 60" stroke="#FBC02D" stroke-width="1" fill="none" opacity="0.6" />
    
    <!-- Блики -->
    <path d="M 30 50 Q 60 45 90 50" stroke="white" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round" />
    
    <!-- Коричневые точки (спелость) - распределены по длине -->
    <circle cx="30" cy="65" r="1.5" fill="#8D6E63" />
    <circle cx="45" cy="70" r="1.2" fill="#8D6E63" />
    <circle cx="60" cy="75" r="1.8" fill="#8D6E63" />
    <circle cx="75" cy="70" r="1.2" fill="#8D6E63" />
    <circle cx="90" cy="65" r="1.5" fill="#8D6E63" />
    <circle cx="50" cy="55" r="1" fill="#8D6E63" />
    <circle cx="70" cy="55" r="1" fill="#8D6E63" />
    
    <!-- Цифры 817 (красные, чуть меньше, чтобы влезть в тонкий банан) -->
    <text x="60" y="62" 
          font-family="Verdana, sans-serif" 
          font-size="14" 
          font-weight="900"
          fill="#D32F2F" 
          text-anchor="middle" 
          dominant-baseline="middle"
          style="text-shadow: 0px 0px 2px rgba(255,255,255,0.9);">817</text>
  </g>

  <!-- Анимация плавного парения -->
  <style>
    g {
      transform-origin: 60px 60px;
      animation: float 2s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-4px) rotate(3deg); }
    }
  </style>
</svg>
